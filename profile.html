<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management - Secure Auth System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card auth-card p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle">
                        <div>
                            <h2 class="auth-title mb-0">User Profile</h2>
                            <p class="auth-subtitle mb-0">Manage your credentials and details</p>
                        </div>
                        <button id="logout-btn" class="btn btn-secondary btn-sm px-4">Logout</button>
                    </div>

                    <div id="feedback" class="feedback-alert"></div>

                    <form id="profile-form" novalidate>
                        <div class="profile-section-title">Account Credentials (MySQL)</div>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control-plaintext text-white border-0 bg-transparent px-0 fw-bold fs-5" id="username" readonly value="Loading...">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="text" class="form-control-plaintext text-white border-0 bg-transparent px-0 fw-bold fs-5" id="email" readonly value="Loading...">
                            </div>
                        </div>

                        <div class="profile-section-title">Personal Details (MongoDB)</div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" name="age" min="1" max="120" placeholder="e.g. 28">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="dob" class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="dob" name="dob">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="contact" class="form-label">Contact Number</label>
                                <input type="tel" class="form-control" id="contact" name="contact" placeholder="e.g. +1234567890">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" name="address" placeholder="e.g. 123 Main St, Springfield">
                            </div>
                        </div>

                        <div class="mt-4 pt-2">
                            <button type="submit" id="submit-btn" class="btn btn-primary px-5">Save Profile Details</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
